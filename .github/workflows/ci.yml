# PIP-MLK CI Pipeline
# ---------------------------------------------------------------------------
# Runs on every PR and every push to main. Gates merges on:
#   1. Lint (bun run lint)        — ESLint + Next.js rules
#   2. Type check (tsc --noEmit)  — TypeScript strict-mode compilation
#   3. Build (bun run build)      — Next.js production build (catches RSC
#                                   violations, bad imports, etc.)
#   4. Prisma validation         — schema + migrations dir sanity check
#
# See docs/RESEARCH-CICD.md §6 for the full CI/CD strategy.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR/branch when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: lint · tsc · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Prisma needs a DATABASE_URL even for `validate`. SQLite uses a file
      # path; the CI runner won't actually open it for `validate`.
      DATABASE_URL: "file:./ci-prisma.db"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Prisma engine
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/client
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      # 1. Lint — ESLint with Next.js core-web-vitals + TypeScript configs.
      #    NODE_OPTIONS increases the heap size to prevent OOM on large projects.
      - name: Lint
        run: bun run lint
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # 2. Type check — strict TypeScript compilation, no JS emit.
      #    Uses --skipLibCheck to avoid errors in third-party .d.ts files.
      #    Non-blocking (continue-on-error) — lint + build are the real gates.
      - name: Type check
        run: bunx tsc --noEmit --skipLibCheck
        continue-on-error: true

      # 3. Prisma validate — catches schema typos before they reach prod.
      - name: Prisma validate
        run: bunx prisma validate

      # 4. Prisma generate — needed by the build step (imports @prisma/client).
      - name: Prisma generate
        run: bun run db:generate

      # 5. PDPA verification — ensure no per-voter data is shipped.
      - name: PDPA file verification
        run: bash scripts/verify-no-pdpa-files.sh

      # 6. Build — Next.js production build.
      - name: Build
        run: bun run build
        env:
          PRISMA_SKIP_DB_PUSH: "1"

      # 7. Cloudflare Workers build (OpenNext) — verifies Worker bundle compiles.
      - name: Cloudflare build
        run: npx @opennextjs/cloudflare build
        env:
          PRISMA_SKIP_DB_PUSH: "1"

  pr-validation:
    name: PR validation
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify worklog updated
        run: |
          if ! git diff --name-only origin/main...HEAD | grep -q "^worklog\.md$"; then
            echo "::error::worklog.md must be updated in every PR (per PIP-MLK convention)"
            exit 1
          fi

      - name: Verify version bumped (if src/ changed)
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "^src/"; then
            OLD=$(git show origin/main:package.json | grep '"version"' | head -1 | sed -E 's/.*"version": "([^"]+)".*/\1/')
            NEW=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": "([^"]+)".*/\1/')
            if [ "$OLD" = "$NEW" ]; then
              echo "::warning::package.json version unchanged but src/ changed — consider a patch bump per docs/RESEARCH-CICD.md §9"
            fi
          fi
